<!DOCTYPE html>
<html lang="en" class="">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>{% block title %}{{ config.title }}{% endblock title %}</title>
	<meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" />
	<link rel="preload" href="/tailwind.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
	<noscript><link rel="stylesheet" href="/tailwind.css" /></noscript>
	<style>body{background-color:#f9fafb}html.dark body{background-color:#1a1a1a}</style>
	<script>
		const saved = localStorage.getItem('theme');
		if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
			document.documentElement.classList.add('dark');
		}
	</script>
</head>
<body class="flex flex-col bg-seasalt dark:bg-warm-charcoal min-h-screen text-seasalt-900 dark:text-seasalt transition-colors">
	<header class="border-seasalt-200 dark:border-warm-charcoal-600 border-b animate-slide-down">
		<nav class="flex justify-between items-center mx-auto px-4 py-4 max-w-4xl">
			<a href="/" class="font-bold hover:text-pumpkin text-xl tracking-tight transition-colors animate-fade-in [animation-delay:100ms]">
				{{ config.title }}
			</a>
			<ul class="flex items-center gap-6 font-medium text-sm">
				<li class="animate-fade-in [animation-delay:150ms]"><a href="/" class="hover:text-pumpkin transition-colors">Home</a></li>
				<li class="animate-fade-in [animation-delay:200ms]"><a href="/blog" class="hover:text-pumpkin transition-colors">Blog</a></li>
				<li class="animate-fade-in [animation-delay:250ms]"><a href="/about" class="hover:text-pumpkin transition-colors">About</a></li>
				<li class="animate-fade-in [animation-delay:300ms]">
					<button id="theme-toggle" aria-label="Toggle dark mode"
						class="hover:bg-seasalt-100 dark:hover:bg-warm-charcoal-600 p-2 rounded-lg text-seasalt-600 hover:text-pumpkin dark:hover:text-pumpkin-300 dark:text-seasalt-300 transition-colors cursor-pointer">
						<!-- Sun icon (shown in dark mode) -->
						<svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="hidden dark:block size-5"
							fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
							<path stroke-linecap="round" stroke-linejoin="round"
								d="M12 3v1m0 16v1m8.66-9H21M3 12H2m15.07-6.07-.71.71M7.64 16.36l-.71.71M18.36 16.36l-.71-.71M6.34 7.64l-.71-.71M17 12a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z" />
						</svg>
						<!-- Moon icon (shown in light mode) -->
						<svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="dark:hidden block size-5"
							fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
							<path stroke-linecap="round" stroke-linejoin="round"
								d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
						</svg>
					</button>
				</li>
			</ul>
		</nav>
	</header>
	<main class="flex-1 mx-auto px-4 py-12 w-full max-w-4xl">
		{% block content %}{% endblock content %}
	</main>
	<footer class="mt-auto border-seasalt-200 dark:border-warm-charcoal-600 border-t">
		<div class="mx-auto px-4 py-6 max-w-4xl text-seasalt-500 dark:text-seasalt-400 text-sm text-center">
			Built with
			<a href="https://www.getzola.org"
				class="hover:text-pumpkin dark:hover:text-pumpkin-300 underline transition-colors">Zola</a>
			and
			<a href="https://tailwindcss.com"
				class="hover:text-pumpkin dark:hover:text-pumpkin-300 underline transition-colors">Tailwind CSS</a>.
			<a href="https://github.com/SpiZeak/zola-tailwind"
				class="hover:text-pumpkin dark:hover:text-pumpkin-300 underline transition-colors">Source on GitHub</a>.
		</div>
	</footer>
	<script>
		document.getElementById('theme-toggle').addEventListener('click', () => {
			const html = document.documentElement;

			if (html.classList.contains('dark')) {
				html.classList.remove('dark');
				localStorage.setItem('theme', 'light');
			} else {
				html.classList.add('dark');
				localStorage.setItem('theme', 'dark');
			}
		});
	</script>
</body>
</html>
